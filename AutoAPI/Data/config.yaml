env:
  test:
    hosts:  # (可选) 不填时接口的 url 必须完整
      host1: "http://192.168.1.6:1806"
      host2: "http://192.168.1.6:1808"
  prod:
    host: "http://192.168.1.126:8080"

active_env: "test"

static:  # 静态变量: 启动时整体注入 suite_ctx, 可在 YAML 用 ${} 直接引用
  cookie:
    authorization: EW2BAqtP18ZmVvW4zDN

request_defaults:  # 全局默认值, requests 通用参数默认值(可被 single.yaml 覆盖)
  headers:  # 默认请求头: 可在构建请求时与 request.headers 合并
    Content-Type: "application/x-www-form-urlencoded"
  timeout: [3.05, 30]  # 超时: [连接超时, 读取超时]

run_control:  # 运行控制
  is_run: true  # single 接口库所有接口默认是否执行, 不填默认为 True
  skip_apis: []  # single 跳过的接口名列表(对应 single.yaml 的 apis 下的 key) 不影响业务流执行
  only_apis: []  # single 白名单(非空时仅执行这里的接口名, 可按需启用) 不影响业务流执行

auth_profiles:
  前置接口:
    - id: "启动汉诺塔业务"
      ref: "启动业务"

