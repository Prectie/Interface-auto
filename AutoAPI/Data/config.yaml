env:
  test:
    host: "http://192.168.1.141:8088/"
  prod:
    host: "http://192.168.1.126:8080"

active_env: "test"

static:  # 静态变量: 启动时整体注入 suite_ctx, 可在 YAML 用 ${} 直接引用
  cookie:
    authorization: bIdGHB2UHESv5jiCIC7

request_defaults:  # 全局默认值, requests 通用参数默认值(可被 single.yaml 覆盖)
#  headers:  # 默认请求头: 可在构建请求时与 request.headers 合并
#    content-type: "application/json"
  timeout: [3.05, 30]  # 超时: [连接超时, 读取超时]
#  verify: False  # https 证书校验开关
#  proxies: null  # 代理: 如 {"http": "...", "https": "..."}, 不需要则 null
  allow_redirects: True  # 是否允许重定向
  cert: null  # 客户端证书: 如 "path/to/client.pem" 或 ("cert", "key")
  auth: null  # 可在具体用例 yaml 中覆盖

run_control:  # 运行控制
  is_run: true  # single 接口库所有接口默认是否执行, 不填默认为 True
  skip_apis: [get_profile_api]  # single 跳过的接口名列表(对应 single.yaml 的 apis 下的 key)
  only_apis: ["login_api", "register_api", "get_profile_api"]  # single 白名单(非空时仅执行这里的接口名, 可按需启用)

auth_profiles:  # 鉴权模板: 自动注入 token 等前置变量
  default:  # 模板名, 用例写 auth: "default" 即可引用
    pre_apis: # 后续的模板必须有该 key
      login:
        order: 1  # 执行顺序(可选, 必须为 int 类型)
        enabled: true  # 是否启用该模板: 若引用但 enabled=false, 直接报错(必填, 不填默认为 False 跳过)

        ref: "login_api"  # 引用接口库模板: 来自 single.yaml 的 aps key(必填)

        override:  # 覆盖模板差异: 只写与模板不同的部分(可选)
          request:
            data:
              - username: "admin"
                password: "123"
          headers:  # 可选: 如需覆盖 headers/options 等, 可在这里补充
            x-tenant: "t1"

        extract:  # 提取规则: 把响应字段写入 suite_ctx/case_ctx(可选)
          - source: "response_json" # 从指定字段提取
            jsonpath: "$.data.token"  # 提取表达式, 统一使用 jsonpath_ng
            as: "token"  # 写入变量名, 后续用 ${token} 引用
#          - source: "response_x"
#      get_profile:
#        order: 2
#        enabled: true  # 是否启用该模板: 若引用但 enabled=false → 直接报错
#
#        ref: "get_profile_api"  # 引用接口库模板: 来自 single.yaml 的 aps key(只维护一份登录接口定义)
#
