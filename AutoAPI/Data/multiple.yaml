common:
  allure_epic: "登录测试用例"
  allure_feature: "用户模块"
  allure_story: "用户模块"

flow_id: "user_register_flow_001"  # 业务流唯一标识
is_run: true  # 是否执行该业务流（multiple 只看 flow/step 的 is_run）

auth: "default"  # flow 级鉴权：执行 flow 前确保 token 已注入（等价于每个 step 写 auth）

step:
  - name: "step_1_register"  # 步骤名：用于日志/Allure step 展示
    is_run: true  # 步骤开关：只影响本 step
    ref: "register_api"  # 引用接口模板：来自 single.yaml 的 apis key
    override: # 覆盖/补充：只写本步骤与模板不同的部分
      data: # 覆盖模板 data（list 默认替换）
        - username: "flow_user_001"
          password: "flow_pwd_001"
      assert: # 覆盖模板断言（如果不写则继承模板）
        - source: "response_json" # 从指定字段提取
          jsonpath: "$.code"
          op: "=="
          expected: 0
  - name: "step_2_get_profile"
    ref: "get_profile_api"
    override:
      data:
        - user_id: "${user_id}"  # 引用 step_1/模板 extract 写入 ctx 的变量
