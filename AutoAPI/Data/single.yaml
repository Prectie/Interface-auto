apis:
  启动业务:
    request:  # 统一请求描述
      method: "post" # 大小写均可
      host: "host1"
      url: "/je/orp/scenario/startDs"  # 接口路径：与 host 拼接
      body_type: "data"  # 请求载荷类型：params/json/data/file
      body: # 数据驱动：list
#        - scenarioMakeId: "sneEi3mzpDN3tlZ8fz8"
        - scenarioMakeId: "a9YsWRcL3MWx3FrHj95"

    extract:
      - source: "response_json"
        jsonpath: "$.obj"
        as: "taskId"

    assertions:  # 简单断言
      - source: "response_json"
        jsonpath: "$.success"
        op: "=="
        expected: true
  上传数据:
    request: # 统一请求描述
      method: "post" # 大小写均可
      host: "host2"
      url: "/ds/task/inst/scene/member/update"  # 接口路径：与 host 拼接
      headers:
        Content-Type: "application/json"
      params:
        taskId: "${taskId}"
      body_type: "json"  # 请求载荷类型：params/json/data/file
      body:
        - {
          "attrs": {
            "级数设置": {
                "state": "4"
              }
            }
          }
        - {
          "attrs": {
            "级数设置": {
              "state": "4"
            }
          }
        }

    assertions: # 简单断言
      - source: "response_json"
        jsonpath: "$.success"
        op: "=="
        expected: true
  获取对象值:
    request:
      method: "post"
      host: "host2"
      url: "/ds/task/op/inst/value/by/name"
      headers:
        Content-Type: "application/json"
      body_type: "json"
      body:
        - taskId: "${taskId}"
          name: "玩汉诺塔.自动汉诺塔A号.挪动计数器"

    assertions: # 简单断言
      - source: "response_json"
        jsonpath: "$.data.value"
        op: "=="
        expected: "I15"

  停止任务:
    request: # 统一请求描述
      method: "post" # 大小写均可
      host: "host2"
      url: "/ds/task/op/stop"  # 接口路径：与 host 拼接
      headers:
        Content-Type: "application/json"
      body_type: "json"  # 请求载荷类型：params/json/data/file
      body:
        - {"taskId": "${taskId}"}

    assertions: # 简单断言
      - source: "response_json"
        jsonpath: "$.success"
        op: "=="
        expected: true


