基础配置:  #后续测试报告中显示
  用例类型: ApiCase
  用例标题: 购物车用例标题
  一级模块: 购物车模块
  二级模块: 购物车功能

前置脚本: ""
后置脚本: ""

用例步骤:
  - 发送购物车接口:
      操作类型: 发送请求POST
      请求地址: "{{URL}}"
      URL参数:
        s: api/cart/save
        application: app
        application_client_type: weixin
        token: '{{msg_token}}'
      请求数据:
        goods_id: 2,
        stock: 1,

  - 提取响应数据msg: #实际结果
      操作类型: 提取数据JSON
      表达式: $..msg
      变量名: sj_msg

  - 断言响应数据: #优化
      操作类型: 断言文本相等
      期望结果: 加入成功
      实际结果: "{{sj_msg}}"

  - 深度断言响应数据: #预期结果和实际结果对比  assert 预期结果>实际结果，"错误时显示信息"
      操作类型: 批量断言
      期望结果: {'msg': '加入成功', 'code': 0, 'data': 1}